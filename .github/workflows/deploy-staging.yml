name: Deploy to VPS STAGING

on:
  push:
    branches:
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          cat <<EOF > .env
          PORT=${{ vars.PORT }}
          DBHOST=${{ vars.DBHOST }}
          DBPORT=${{ vars.DBPORT }}
          DBUSER=${{ vars.DBUSER }}
          DBPASS=${{ secrets.DBPASS }}
          DBNAME=${{ vars.DBNAME }}
          RAJAONGKIR_API=${{ secrets.RAJAONGKIR_API }}
          RAJAONGKIR_BASE_URL=${{ vars.RAJAONGKIR_BASE_URL }}
          JWTSECRET=${{ secrets.JWTSECRET }}
          REDISURL=${{ vars.REDISURL }}
          CLOUNINARY_CLOUD_NAME=${{ vars.CLOUNINARY_CLOUD_NAME }}
          CLOUNINARY_API_KEY=${{ secrets.CLOUNINARY_API_KEY }}
          CLOUNINARY_API_SECRET=${{ secrets.CLOUNINARY_API_SECRET }}
          SMTP_HOST=${{ vars.SMTP_HOST }}
          SMTP_PORT=${{ vars.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ vars.SMTP_FROM }}
          SMTP_SECURE=${{ vars.SMTP_SECURE }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          EOF

      - name: Build project
        run: npm run build
        env:
          PORT: ${{ vars.PORT }}
          DBHOST: ${{ vars.DBHOST }}
          DBPORT: ${{ vars.DBPORT }}
          DBUSER: ${{ vars.DBUSER }}
          DBPASS: ${{ secrets.DBPASS }}
          DBNAME: ${{ vars.DBNAME }}
          RAJAONGKIR_API: ${{ secrets.RAJAONGKIR_API }}
          RAJAONGKIR_BASE_URL: ${{ vars.RAJAONGKIR_BASE_URL }}
          JWTSECRET: ${{ secrets.JWTSECRET }}
          REDISURL: ${{ vars.REDISURL }}
          CLOUNINARY_CLOUD_NAME: ${{ vars.CLOUNINARY_CLOUD_NAME }}
          CLOUNINARY_API_KEY: ${{ secrets.CLOUNINARY_API_KEY }}
          CLOUNINARY_API_SECRET: ${{ secrets.CLOUNINARY_API_SECRET }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          SMTP_SECURE: ${{ vars.SMTP_SECURE }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Prepare SSH key
        run: |
          printf "%s" "$PRIVATE_KEY" > key.pem
          chmod 600 key.pem
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Test SSH Connection
        run: |
          ssh -v -i key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }} "echo 'SSH connection successful'"

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=no" \
            ./dist/ ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:${{ vars.SERVER_DEST_STAGING }}

      - name: Restart PM2 App
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }} \
            "cd ${{ vars.SERVER_DEST_STAGING }} && pm2 restart backend-sf"

      - name: Cleanup
        run: rm -f key.pem
